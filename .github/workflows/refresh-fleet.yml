name: Refresh fleet snapshot

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 min (best-effort on GH Actions)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-fleet
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch meshmap.net/nodes.json and filter to fleet
        shell: bash
        run: |
          set -euo pipefail
          curl -sf --retry 3 --retry-delay 5 --max-time 60 \
            -o /tmp/all.json https://meshmap.net/nodes.json
          python3 - <<'PY'
          import json, time, os
          all_data = json.load(open('/tmp/all.json'))
          # Numeric node IDs of fleet members. Add new ones here as they come online.
          FLEET_IDS = [
              "3070333771",   # Danvers, MA  -- Farls Danvers Solar (!b701934b)
              # "...",        # Jim T-Deck (add once known)
              # "...",        # Jim Lake Cabin WisBlock (add once known)
          ]
          fleet = {nid: all_data[nid] for nid in FLEET_IDS if nid in all_data}

          # Corridor: all nodes inside the MA/NH bounding box that surrounds Mike's
          # endpoint (Danvers MA) and Jim's two endpoints (Kensington NH, Merrymeeting Lake NH).
          # This is for the "grid-down comms" coverage analysis -- pure-LoRa multi-hop
          # viability between the Farley nodes depends on how many other nodes are
          # actively deployed along this path.
          CORRIDOR_BBOX = {"lat_min": 42.3, "lat_max": 43.9, "lon_min": -71.8, "lon_max": -70.6}
          corridor = []
          for nid, rec in all_data.items():
              if not isinstance(rec, dict): continue
              if "latitude" not in rec or "longitude" not in rec: continue
              lat = rec["latitude"] * 1e-7
              lon = rec["longitude"] * 1e-7
              if not (CORRIDOR_BBOX["lat_min"] <= lat <= CORRIDOR_BBOX["lat_max"]
                      and CORRIDOR_BBOX["lon_min"] <= lon <= CORRIDOR_BBOX["lon_max"]):
                  continue
              corridor.append({
                  "id": nid, "lat": lat, "lon": lon,
                  "longName": rec.get("longName", "?"),
                  "shortName": rec.get("shortName", "?"),
                  "role": rec.get("role", "?"),
                  "hwModel": rec.get("hwModel", "?"),
              })

          out = {
              "updated":              int(time.time()),
              "total_worldwide":      len(all_data),
              "fleet_ids_configured": FLEET_IDS,
              "fleet_ids_present":    list(fleet.keys()),
              "fleet":                fleet,
              "corridor_bbox":        CORRIDOR_BBOX,
              "corridor":             corridor,
          }
          with open("fleet.json", "w") as f:
              json.dump(out, f, separators=(",", ":"))
          print(f"Wrote fleet.json: {len(fleet)}/{len(FLEET_IDS)} fleet present, "
                f"{len(corridor)} corridor nodes, {len(all_data)} worldwide.")
          PY

      - name: Commit if changed
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fleet.json
          if git diff --staged --quiet; then
            echo "No changes -- skipping commit."
          else
            git commit -m "chore: refresh fleet snapshot ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
